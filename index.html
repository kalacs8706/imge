<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>.IMGE Ultimate Tool</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; max-width: 800px; margin: 2rem auto; background: #f0f4f8; padding: 20px; color: #1e293b; }
        .card { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 25px; }
        h3 { margin-top: 0; color: #334155; }
        
        /* Progress Bar */
        .progress-container { width: 100%; background: #e2e8f0; height: 10px; border-radius: 10px; margin: 15px 0; overflow: hidden; display: none; }
        .progress-bar { width: 0%; height: 100%; background: #3b82f6; transition: width 0.1s; }
        
        /* Controls */
        .input-group { margin: 20px 0; padding: 15px; background: #f8fafc; border-radius: 8px; border: 2px dashed #cbd5e1; }
        .toggle-group { display: flex; align-items: center; gap: 10px; margin: 10px 0; font-size: 0.9rem; font-weight: bold; cursor: pointer; }
        
        /* Hidden elements */
        #outputPreview, #canvasContainer { display: none; }
        
        textarea { width: 100%; height: 150px; font-family: monospace; margin-top: 10px; border: 1px solid #ddd; border-radius: 6px; font-size: 11px; }
        canvas { border: 1px solid #334155; margin-top: 10px; max-width: 100%; image-rendering: pixelated; background: #fff; }
        .status-text { font-size: 0.85rem; font-weight: bold; color: #64748b; }
        
        /* Simple Switch Style */
        .switch { position: relative; display: inline-block; width: 40px; height: 20px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #ccc; transition: .4s; border-radius: 20px; }
        .slider:before { position: absolute; content: ""; height: 14px; width: 14px; left: 3px; bottom: 3px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: #3b82f6; }
        input:checked + .slider:before { transform: translateX(20px); }
    </style>
</head>
<body>

<div class="card">
    <h3>1. Image to .IMGE (Ultimate Compression)</h3>
    <div class="input-group">
        <input type="file" id="imageInput" accept="image/*">
    </div>
    
    <label class="toggle-group">
        <div class="switch">
            <input type="checkbox" id="toggleText">
            <span class="slider"></span>
        </div>
        Show Raw Code Preview (May slow down large images)
    </label>

    <div id="encodeProgressCont" class="progress-container">
        <div id="encodeBar" class="progress-bar"></div>
    </div>
    <div id="encodeStatus" class="status-text">Waiting for file...</div>
    <textarea id="outputPreview" readonly placeholder="Output preview..."></textarea>
</div>

<div class="card">
    <h3>2. .IMGE to Image</h3>
    <div class="input-group">
        <input type="file" id="imgeFileInput" accept=".imge">
    </div>

    <label class="toggle-group">
        <div class="switch">
            <input type="checkbox" id="toggleCanvas" checked>
            <span class="slider"></span>
        </div>
        Show Rendered Image Preview
    </label>

    <div id="decodeProgressCont" class="progress-container">
        <div id="decodeBar" class="progress-bar"></div>
    </div>
    <div id="decodeStatus" class="status-text">Upload a .imge file to decode.</div>
    
    <div id="canvasContainer">
        <canvas id="mainCanvas"></canvas>
    </div>
</div>

<script>
    const canvas = document.getElementById('mainCanvas');
    const ctx = canvas.getContext('2d');

    // --- TOGGLE LOGIC ---
    document.getElementById('toggleText').addEventListener('change', function() {
        document.getElementById('outputPreview').style.display = this.checked ? 'block' : 'none';
    });
    document.getElementById('toggleCanvas').addEventListener('change', function() {
        document.getElementById('canvasContainer').style.display = this.checked ? 'block' : 'none';
    });
    if(document.getElementById('toggleCanvas').checked) document.getElementById('canvasContainer').style.display = 'block';

    // --- ENCODER LOGIC (SUPER COMPRESSED) ---
    document.getElementById('imageInput').addEventListener('change', function(e) {
        if (!this.files[0]) return;
        const file = this.files[0];
        const reader = new FileReader();
        
        // COMPRESSION SETTING: Higher number = smaller file (Try 16, 24, or 32)
        const bitRes = 24; 

        reader.onload = (event) => {
            const img = new Image();
            img.onload = () => {
                const tempCanvas = document.createElement('canvas');
                const tCtx = tempCanvas.getContext('2d');
                tempCanvas.width = img.width;
                tempCanvas.height = img.height;
                tCtx.drawImage(img, 0, 0);
                
                const pix = tCtx.getImageData(0, 0, img.width, img.height).data;
                let output = `lineLength=${img.width}\n`; // Removed spaces
                
                const progCont = document.getElementById('encodeProgressCont');
                const bar = document.getElementById('encodeBar');
                const status = document.getElementById('encodeStatus');
                
                progCont.style.display = 'block';
                let y = 0;

                function processRows() {
                    const chunkEnd = Math.min(y + 25, img.height);
                    for (; y < chunkEnd; y++) {
                        let colors = {};
                        for (let x = 0; x < img.width; x++) {
                            let i = (y * img.width + x) * 4;
                            
                            // 1. COLOR QUANTIZATION (Rounding to group similar colors)
                            let r = Math.round(pix[i] / bitRes) * bitRes;
                            let g = Math.round(pix[i+1] / bitRes) * bitRes;
                            let b = Math.round(pix[i+2] / bitRes) * bitRes;
                            
                            // Keep safely within 0-255
                            r = Math.min(255, Math.max(0, r));
                            g = Math.min(255, Math.max(0, g));
                            b = Math.min(255, Math.max(0, b));

                            // 2. DROP THE HASH (We don't need the # symbol)
                            let hex = ((1 << 24) + (r << 16) + (g << 8) + b).toString(16).slice(1).toUpperCase();
                            
                            if (!colors[hex]) colors[hex] = [];
                            colors[hex].push(x + 1);
                        }

                        let rowParts = Object.entries(colors).map(([hex, idxs]) => {
                            let ranges = [], start = idxs[0], prev = idxs[0];
                            
                            // 3. RANGE ENCODING (Turns 1.2.3.4 into 1-4)
                            for (let k = 1; k <= idxs.length; k++) {
                                if (k < idxs.length && idxs[k] === prev + 1) prev = idxs[k];
                                else {
                                    ranges.push(start === prev ? start : `${start}-${prev}`);
                                    if (k < idxs.length) { start = prev = idxs[k]; }
                                }
                            }
                            // 4. REMOVE SPACES around the equals sign
                            return `${ranges.join('.')}=${hex}`;
                        });
                        
                        output += rowParts.join(',') + ',\n'; // Removed spaces after commas
                    }

                    const percent = Math.floor((y / img.height) * 100);
                    bar.style.width = percent + "%";
                    status.innerText = `Compressing: ${percent}%`;

                    if (y < img.height) {
                        requestAnimationFrame(processRows);
                    } else {
                        document.getElementById('outputPreview').value = output;
                        const blob = new Blob([output], { type: 'text/plain' });
                        const a = document.createElement('a');
                        a.href = URL.createObjectURL(blob);
                        a.download = file.name.split('.')[0] + ".imge";
                        a.click();
                        status.innerText = "✓ Compressed & Downloaded!";
                        setTimeout(() => progCont.style.display = 'none', 2000);
                    }
                }
                processRows();
            };
            img.src = event.target.result;
        };
        reader.readAsDataURL(file);
    });

    // --- DECODER LOGIC (UPDATED FOR COMPRESSION) ---
    document.getElementById('imgeFileInput').addEventListener('change', function(e) {
        if (!this.files[0]) return;
        const reader = new FileReader();
        reader.onload = (event) => {
            const text = event.target.result.trim();
            const lines = text.split('\n');
            const lengthMatch = lines[0].match(/lineLength\s*=\s*(\d+)/);
            if (!lengthMatch) return alert("Invalid .imge file");

            const width = parseInt(lengthMatch[1]);
            const height = lines.length - 1;
            canvas.width = width;
            canvas.height = height;

            const progCont = document.getElementById('decodeProgressCont');
            const bar = document.getElementById('decodeBar');
            const status = document.getElementById('decodeStatus');
            progCont.style.display = 'block';

            let lineIdx = 1;
            function decodeRows() {
                const chunkEnd = Math.min(lineIdx + 60, lines.length);
                for (; lineIdx < chunkEnd; lineIdx++) {
                    const rowStr = lines[lineIdx];
                    if (!rowStr) continue;
                    
                    const segments = rowStr.split(',').filter(s => s.trim().length > 0);
                    segments.forEach(seg => {
                        const parts = seg.split('=');
                        if(parts.length < 2) return;
                        
                        const indicesPart = parts[0].trim();
                        // Add the hash back for the canvas to understand the color
                        const color = "#" + parts[1].trim(); 
                        
                        const indices = indicesPart.replace(/\.$/, '').split('.');
                        
                        indices.forEach(range => {
                            // Decode Hyphens back into drawn rectangles
                            if (range.includes('-')) {
                                const [s, end] = range.split('-').map(Number);
                                ctx.fillStyle = color;
                                // Draw the whole block at once (much faster!)
                                ctx.fillRect(s - 1, lineIdx - 1, (end - s) + 1, 1);
                            } else {
                                ctx.fillStyle = color;
                                ctx.fillRect(parseInt(range) - 1, lineIdx - 1, 1, 1);
                            }
                        });
                    });
                }
                const percent = Math.floor((lineIdx / lines.length) * 100);
                bar.style.width = percent + "%";
                status.innerText = `Restoring: ${percent}%`;

                if (lineIdx < lines.length) {
                    requestAnimationFrame(decodeRows);
                } else {
                    status.innerText = "✓ Image Restored!";
                    setTimeout(() => progCont.style.display = 'none', 2000);
                }
            }
            decodeRows();
        };
        reader.readAsText(this.files[0]);
    });
</script>

</body>
</html>
